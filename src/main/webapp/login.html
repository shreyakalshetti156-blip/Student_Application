<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-blue: #0a1930;
            --navy-blue: #152642;
            --gold: #d4af37;
            --light-gold: #f1e5ac;
        }
        
        body {
            background: linear-gradient(135deg, var(--dark-blue) 0%, var(--navy-blue) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            margin: 0;
        }
        
        .page-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100%;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            margin: 20px auto;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }
        
        .logo-section {
            background: linear-gradient(135deg, var(--navy-blue) 0%, var(--dark-blue) 100%);
            padding: 30px 20px;
            text-align: center;
            color: var(--light-gold);
            border-bottom: 2px solid var(--gold);
        }
        
        .logo-img {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, var(--navy-blue) 0%, var(--dark-blue) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }
        
        .logo-img img {
            width: 90%;
            height: auto;
            filter: brightness(1.2);
        }
        
        .form-section {
            padding: 30px;
        }
        
        .form-control {
            padding: 14px 20px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            transition: all 0.3s;
            background: rgba(10, 25, 48, 0.7);
            color: white;
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
            background: rgba(10, 25, 48, 0.9);
            color: white;
        }
        
        .btn-login {
            background: linear-gradient(135deg, var(--gold) 0%, #b8860b 100%);
            border: none;
            padding: 14px;
            border-radius: 10px;
            color: var(--dark-blue);
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, #e6c052 0%, #c9981a 100%);
        }
        
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .links a {
            color: var(--gold);
            text-decoration: none;
            transition: color 0.3s;
            margin: 5px 0;
        }
        
        .links a:hover {
            color: var(--light-gold);
            text-decoration: underline;
        }
        
        .signup-link {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .signup-link a {
            color: var(--gold);
            font-weight: 600;
        }
        
        .input-icon {
            position: relative;
        }
        
        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            z-index: 2;
        }
        
        .input-icon input {
            padding-left: 45px;
        }
        
        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            padding: 15px;
            width: 100%;
            margin-top: auto;
            font-size: 0.9rem;
        }
        
        .form-check-input:checked {
            background-color: var(--gold);
            border-color: var(--gold);
        }
        
        .form-check-label {
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* Responsive adjustments */
        @media (max-height: 700px) {
            .login-container {
                margin: 10px auto;
            }
            
            .logo-section {
                padding: 20px 15px;
            }
            
            .form-section {
                padding: 20px;
            }
        }
        
        @media (max-width: 576px) {
            .login-container {
                border-radius: 15px;
            }
            
            .logo-img {
                width: 90px;
                height: 90px;
            }
            
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="login-container">
            <div class="logo-section">
                <div class="logo-img">
                    <!-- Replace this image with your actual logo -->
                    <img src="https://play-lh.googleusercontent.com/8ZDxwWHQnKPHu3hJDN0whQqz8PDtpH1niWl_s6NIJ1Xitu612zFbYJRif8Dv8wisBg" alt="Student Management System Logo">
                </div>
                <h2>Pentagon Space Pvt. Ltd.</h2>
                <p class="mb-0">Student Login Page</p>
            </div>
            
            <div class="form-section">
                <form>
                    <div class="mb-3 input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email address">
                    </div>
                    
                    <div class="mb-3 input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" id="password" placeholder="Enter your password">
                    </div>
                    
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    
                    <button type="submit" class="btn btn-login">Login to Dashboard</button>
                    
                    <div class="links">
                        <a href="signup.jsp" class="text-decoration-none">Create an account</a>
                        <a href="forgot.jsp" class="text-decoration-none">Forgot password?</a>
                    </div>
                </form>
                
                <div class="signup-link">
                    <p>Don't have an account? <a href="#" class="text-decoration-none fw-bold">Sign up here</a></p>
                </div>
            </div>
        </div>
        
        <footer>
            <p>© 2025 Pentagon Space Pvt. Ltd. All rights reserved.</p>
        </footer>
    </div>

    <!-- Bootstrap & Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
